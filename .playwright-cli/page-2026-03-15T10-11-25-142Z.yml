  - main [ref=e29]:
    - generic [ref=e30]:
      - paragraph [ref=e31]: Le cabinet
      - heading "Le Cabinet" [level=1] [ref=e32]
      - paragraph [ref=e33]: Exclusivement dédié au droit immobilier et au droit public, le cabinet Hélians a développé une expertise approfondie en matière d'expropriation.
      - paragraph [ref=e34]: Notre clientèle est composée de particuliers, d'entreprises, d'établissements hospitaliers et médico-sociaux, de syndicats de copropriétaires et de propriétaires.
      - paragraph [ref=e35]: Nous mettons nos compétences au service du conseil, de la négociation et du contentieux. Après une analyse rigoureuse de chaque dossier et un échange approfondi avec notre client, nous apportons systématiquement une réponse personnalisée et concrète.
      - paragraph [ref=e36]: Le cabinet Hélians privilégie la voie amiable et la médiation. Le recours au contentieux n'est envisagé que lorsqu'il constitue un moyen efficace, rapide et proportionné à l'enjeu du litige.
      - paragraph [ref=e37]: "Pour les sujets nécessitant des compétences complémentaires, nous mobilisons un réseau éprouvé de confrères et d'experts : notaires, experts techniques ou fonciers, huissiers. Habitués au travail pluridisciplinaire, les membres du cabinet sont régulièrement sollicités par d'autres professionnels du droit dans leurs domaines de spécialité."
      - heading "L'équipe" [level=2] [ref=e39]
      - generic [ref=e40]:
        - generic [ref=e41]:
          - img "Gilles CAILLET" [ref=e42]
          - heading "Gilles CAILLET" [level=3] [ref=e43]
          - paragraph [ref=e44]: Avocat gérant
          - paragraph [ref=e45]: Avocat depuis 1995, Gilles Caillet consacre sa pratique au droit immobilier et au droit public. Il a acquis une expertise reconnue en droit de l'expropriation, domaine dans lequel il intervient depuis plus de vingt ans.
          - paragraph [ref=e46]: "Ancien chargé d'enseignement à l'Université d'Angers et à l'INSET d'Angers (formation des attachés et ingénieurs territoriaux), il anime régulièrement des sessions de formation auprès de professionnels de l'immobilier et de la construction : juristes d'entreprises du bâtiment, agents immobiliers et experts."
          - list [ref=e47]:
            - listitem [ref=e48]: Inscrit au barreau d'Angers en 1995, puis au barreau de Paris en 2004
            - listitem [ref=e49]: CAPA — École du Centre-Ouest des Avocats (Poitiers)
            - listitem [ref=e50]: DESS Droit de la construction — Université de Poitiers
            - listitem [ref=e51]: Maîtrise de droit public — Université d'Angers
        - generic [ref=e52]:

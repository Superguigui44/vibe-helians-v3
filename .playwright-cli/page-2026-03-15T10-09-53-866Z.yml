      - generic [ref=e73]:
        - heading "Le cabinet" [level=2] [ref=e74]
        - paragraph [ref=e75]: Exclusivement dédié au droit immobilier et au droit public, le cabinet Hélians a développé une expertise approfondie en matière d'expropriation.
        - paragraph [ref=e76]: Notre clientèle est composée de particuliers, d'entreprises, d'établissements hospitaliers et médico-sociaux, de syndicats de copropriétaires et de propriétaires.
        - paragraph [ref=e77]: Nous mettons nos compétences au service du conseil, de la négociation et du contentieux. Après une analyse rigoureuse de chaque dossier et un échange approfondi avec notre client, nous apportons systématiquement une réponse personnalisée et concrète.
        - paragraph [ref=e78]: Le cabinet Hélians privilégie la voie amiable et la médiation. Le recours au contentieux n'est envisagé que lorsqu'il constitue un moyen efficace, rapide et proportionné à l'enjeu du litige.
        - paragraph [ref=e79]: "Pour les sujets nécessitant des compétences complémentaires, nous mobilisons un réseau éprouvé de confrères et d'experts : notaires, experts techniques ou fonciers, huissiers. Habitués au travail pluridisciplinaire, les membres du cabinet sont régulièrement sollicités par d'autres professionnels du droit dans leurs domaines de spécialité."
        - link "En savoir plus" [ref=e81] [cursor=pointer]:
          - /url: /cabinet.html

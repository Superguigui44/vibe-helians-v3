  - main [ref=e29]:
    - generic [ref=e31]:
      - generic [ref=e32]:
        - paragraph [ref=e33]: Nos expertises
        - heading "Expropriation — Défense des expropriés" [level=1] [ref=e34]
        - generic [ref=e35]:
          - paragraph [ref=e36]: Faire l'objet d'une procédure d'expropriation est une épreuve qui bouleverse un projet de vie ou d'entreprise. Il est essentiel de se faire accompagner le plus tôt possible par un avocat expérimenté.
          - paragraph [ref=e37]: L'assistance d'un avocat permet aux personnes et sociétés concernées d'être défendues à chaque étape de la procédure, tant devant la juridiction de l'expropriation que face aux administrations compétentes.
          - paragraph [ref=e38]: Les conseils d'un avocat spécialisé donnent accès aux subtilités de la procédure et, surtout, permettent de déterminer au plus juste le montant de l'indemnité à laquelle vous pouvez prétendre.
          - paragraph [ref=e39]: Depuis plus de vingt ans, Gilles Caillet conseille et défend des particuliers et des entreprises confrontés à l'expropriation, notamment dans le cadre du Grand Paris Express.
          - paragraph [ref=e40]: Il a constitué une équipe d'avocats spécialisés dans ce domaine.
          - paragraph [ref=e41]: "Le cabinet Hélians défend également les propriétaires et commerçants riverains des opérations d'expropriation : expertise préventive, dommages de chantier et pertes d'exploitation."
          - heading "Domaines d'intervention" [level=3] [ref=e42]
          - list [ref=e43]:
            - listitem [ref=e44]: Procédure en constatation du défaut de base légale de l'ordonnance de transfert de propriété
            - listitem [ref=e45]: Droit de rétrocession
